[General]
Name = "My HighBeam Server"
Port = 18860
# PublicAddr = "play.example.com"  # Required only if you want this server listed in the community browser
MaxPlayers = 20
MaxCarsPerPlayer = 3
Map = "/levels/gridmap_v2/info.json"
Description = "A HighBeam server"
ResourceFolder = "Resources"
StateFile = "server_state.json"

[Auth]
Mode = "open"
MaxAuthAttempts = 5
AuthTimeoutSec = 30

[Network]
TickRate = 20
UdpBufferSize = 65535
UdpRelayDistanceMeters = 0 # <=0 disables distance culling (full sync across map)
TcpKeepAliveSec = 15
EnableModSync = true
# ModSyncPort = 18861  # Optional. Used only when EnableModSync = true. Auto-disabled if Resources/Client/ has no mods.

[Logging]
Level = "info"
LogFile = "server.log"
LogChat = true
MetricsIntervalSec = 60
RotationMaxSizeMb = 100
RotationMaxDays = 7

[TLS]
Enabled = false
CertPath = "certs/server.pem"
KeyPath = "certs/key.pem"
AutoGenerate = false

[Updates]
AutoUpdate = true

# ──────────────────────────────────────────────────────────────────────────────
# Community Relay — optional public server listing
#
# When EnableRelay is true the server POSTs a registration heartbeat to each
# URL in RelayUrls every RegistrationIntervalSec seconds so that players can
# discover this server from the in-game Browse Servers tab.
#
# No central HighBeam relay exists — RelayUrls must point to a community-run
# relay service.  The relay only needs to expose two endpoints:
#   POST /          — receive and store the registration payload
#   GET  /servers   — return a JSON list of registered servers
#
# See docs/architecture/RELAY.md for the full relay protocol and an example
# relay implementation.
#
# Setting EnableRelay = false (the default) means this server is never listed
# anywhere publicly.  Players can still join via Direct Connect at any time.
# ──────────────────────────────────────────────────────────────────────────────
[Discovery]
EnableRelay             = false
RelayUrls               = []
RegistrationIntervalSec = 30

# ──────────────────────────────────────────────────────────────────────────────
# Community Node Discovery Mesh — managed via GUI / console commands
#
# Community browser setup uses two places:
#   • PublicAddr is set here once because it is part of your public network identity.
#   • The rest (enable/disable, HTTP port, region, tags, seed nodes) are managed through:
#   • The server GUI "Community" tab  — recommended for desktop installs
#   • Console commands               — `community enable`, `community status`, etc.
#
# State is persisted to community_node.json alongside this file.
# This file is never modified automatically by the community node system.
# ──────────────────────────────────────────────────────────────────────────────

