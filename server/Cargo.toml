[package]
name = "highbeam-server"
version = "0.2.0"
edition = "2021"
description = "HighBeam multiplayer server for BeamNG.drive"
license = "MIT"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1"
thiserror = "2"
anyhow = "1"
rand = "0.8"
sha2 = "0.10"
dashmap = "6"
