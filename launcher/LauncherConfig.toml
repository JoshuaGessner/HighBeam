# HighBeam launcher configuration

server_addr = "127.0.0.1:18860"
# Optional explicit endpoint for mod sync. If unset, launcher uses server_addr with port + 1.
mod_sync_addr = ""
cache_dir = "~/.highbeam/cache"
# Path to BeamNG.drive executable. Leave empty to auto-detect from Steam.
beamng_exe = ""
# Path to BeamNG.drive user data folder. Leave empty to auto-detect.
# Modern BeamNG (0.27+) on Windows: C:\Users\<you>\AppData\Local\BeamNG\BeamNG.drive
# Legacy / BeamMP on Windows:       C:\Users\<you>\AppData\Local\BeamNG.drive
beamng_userfolder = ""
# Optional community relay URLs used by --browse-relay when no URL is passed.
discovery_relays = []
# Saved servers for --favorites/--browse-favorites flows.
favorite_servers = []
# Last connected/queried servers (automatically maintained).
recent_servers = []
query_timeout_ms = 1500
connect_timeout_sec = 10
