name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: highbeam-server
            archive: highbeam-server-linux-x86_64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: highbeam-server.exe
            archive: highbeam-server-windows-x86_64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: highbeam-server
            archive: highbeam-server-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: highbeam-server
            archive: highbeam-server-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        working-directory: server
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp server/target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cp server/ServerConfig.default.toml staging/ServerConfig.toml
          cd staging
          tar czf ../${{ matrix.archive }} *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "server/target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          Copy-Item "server/ServerConfig.default.toml" staging/ServerConfig.toml
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
