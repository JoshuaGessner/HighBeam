name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: highbeam-server
            archive: highbeam-server-linux-x86_64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: highbeam-server.exe
            archive: highbeam-server-windows-x86_64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: highbeam-server
            archive: highbeam-server-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: highbeam-server
            archive: highbeam-server-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps (tray-item requires libdbus)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Build release binary
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        working-directory: server
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/Resources/Client
          mkdir -p staging/Resources/Server
          cp server/target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cp server/ServerConfig.default.toml staging/ServerConfig.toml
          cd staging
          tar czf ../${{ matrix.archive }} *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/Resources/Client
          New-Item -ItemType Directory -Force -Path staging/Resources/Server
          Copy-Item "server/target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          Copy-Item "server/ServerConfig.default.toml" staging/ServerConfig.toml
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-launcher:
    name: Build Launcher (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild launcher payload zip from client sources
        shell: pwsh
        run: |
          Remove-Item -Force "launcher/payload/highbeam.zip" -ErrorAction SilentlyContinue
          Push-Location client
          Compress-Archive -Path scripts, lua, ui -DestinationPath ../launcher/payload/highbeam.zip
          Pop-Location

      - name: Validate launcher Cargo version matches release tag
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          $match = Select-String -Path "launcher/Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $match) {
            throw "Could not read launcher version from launcher/Cargo.toml"
          }
          $cargoVersion = $match.Matches[0].Groups[1].Value
          if ($tagVersion -ne $cargoVersion) {
            throw "Release tag version ($tagVersion) does not match launcher Cargo version ($cargoVersion)."
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        working-directory: launcher
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Run tests
        working-directory: launcher
        run: cargo test --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "launcher/target/x86_64-pc-windows-msvc/release/highbeam-launcher.exe" staging/
          Copy-Item "launcher/LauncherConfig.toml" staging/
          Copy-Item "launcher/payload/highbeam.zip" staging/
          Set-Content -Path "staging/VERSION" -Value "${{ github.ref_name }}" -NoNewline
          Compress-Archive -Path staging/* -DestinationPath highbeam-launcher-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: highbeam-launcher-windows-x86_64.zip
          path: highbeam-launcher-windows-x86_64.zip

  release:
    name: Create GitHub Release
    needs: [build, build-launcher]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete existing dev release for this tag (fresh draft)
        if: contains(github.ref_name, '-dev.')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: ${{ contains(github.ref_name, '-dev.') }}
          prerelease: ${{ contains(github.ref_name, '-dev.') }}
          make_latest: false
          files: artifacts/*
